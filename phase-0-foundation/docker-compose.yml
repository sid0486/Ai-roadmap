services:  
  app:
    build: .
    container_name: phase-0-foundation
    ports:
      - "8000:8000"
    env_file:
      - .env 
    depends_on:
      - db


  db:
    image: postgres:15
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: